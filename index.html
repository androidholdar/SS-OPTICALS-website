<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>S. S. OPTICALS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* NAVBAR */

nav{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

nav h1{
margin:0;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav li{
cursor:pointer;
}

/* HERO */

.hero{
height:400px;
background:linear-gradient(120deg,#9c27b0,#2196f3);
color:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.hero h2{
font-size:40px;
margin:0;
}

.hero button{
padding:12px 25px;
border:none;
background:black;
color:white;
margin-top:15px;
cursor:pointer;
}

/* ABOUT */

.about{
padding:60px;
display:flex;
justify-content:center;
gap:60px;
background:white;
}

.about img{
width:250px;
}

.about div{
max-width:400px;
}

/* PRODUCTS */

.products{
padding:60px;
background:linear-gradient(#dfe6ff,#cfd6ff);
}

.products h2{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
}

.price{
color:#e91e63;
font-weight:bold;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

/* ADMIN */

.admin{
padding:40px;
background:white;
}

.admin input,.admin select{
width:100%;
padding:10px;
margin-top:10px;
}

.admin button{
padding:10px;
margin-top:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<h1>S. S. OPTICALS</h1>

<ul>
<li onclick="scrollToSection('home')">Home</li>
<li onclick="scrollToSection('about')">About</li>
<li onclick="scrollToSection('shop')">Shop</li>
</ul>

</nav>

<!-- HERO -->

<section class="hero" id="home">

<h2>WELCOME TO</h2>
<h1>S. S. OPTICALS</h1>

<button onclick="scrollToSection('shop')">Shop Now</button>

</section>

<!-- ABOUT -->

<section class="about" id="about">

<div>

<h2>About Our Shop</h2>

<p>
S. S. OPTICALS provides stylish optical frames and premium goggles.
We offer affordable eyewear with modern designs.
</p>

</div>

<img src="https://cdn-icons-png.flaticon.com/512/2976/2976215.png">

</section>

<!-- PRODUCTS -->

<section class="products" id="shop">

<h2>Our Glasses</h2>

<div class="grid" id="items"></div>

</section>

<!-- ADMIN -->

<section class="admin">

<h3>Add Product</h3>

<select id="category">
<option value="frame">Optical Frame</option>
<option value="goggle">Goggle</option>
</select>

<input id="name" placeholder="Product name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<input id="desc" placeholder="Description">

<button onclick="saveItem()">Save Product</button>

</section>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box" id="modalContent"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("opticalItems")) || []

function render(){

let grid=document.getElementById("items")

grid.innerHTML=""

items.forEach((item,i)=>{

grid.innerHTML+=`

<div class="card" onclick="preview(${i})">

<img src="${item.image}">

<h3>${item.name}</h3>

<p class="price">₹${item.price}</p>

</div>

`

})

}

function preview(i){

let item=items[i]

let modal=document.getElementById("modal")

let content=document.getElementById("modalContent")

content.innerHTML=`

<img src="${item.image}" style="width:100%">

<h2>${item.name}</h2>

<p>${item.desc}</p>

<h3>₹${item.price}</h3>

<button onclick="editItem(${i})">Edit</button>
<button onclick="deleteItem(${i})">Delete</button>
<button onclick="closeModal()">Close</button>

`

modal.style.display="flex"

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

function saveItem(){

let category=document.getElementById("category").value
let name=document.getElementById("name").value
let price=document.getElementById("price").value
let image=document.getElementById("image").value
let desc=document.getElementById("desc").value

items.push({category,name,price,image,desc})

localStorage.setItem("opticalItems",JSON.stringify(items))

render()

alert("Product Added")

}

function deleteItem(i){

items.splice(i,1)

localStorage.setItem("opticalItems",JSON.stringify(items))

render()

closeModal()

}

function editItem(i){

let item=items[i]

document.getElementById("name").value=item.name
document.getElementById("price").value=item.price
document.getElementById("image").value=item.image
document.getElementById("desc").value=item.desc

deleteItem(i)

closeModal()

}

function scrollToSection(id){

document.getElementById(id).scrollIntoView({behavior:'smooth'})

}

render()

</script>

</body>
</html>
